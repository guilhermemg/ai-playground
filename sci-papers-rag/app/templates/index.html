<!DOCTYPE html>
<html>
<head>
    <title>ArXiv Paper Summarizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <h1><span>ArXiv Paper Summarizer</span></h1>
    
    <div class="container">
        <!-- Collections Panel -->
        <div class="paper-list">
            <div class="collections-header">
                <h2>Collections</h2>
                <button onclick="addCollection()" class="add-collection-btn">+ New Collection</button>
            </div>

            <!-- Default collection -->
            <div class="collection expanded" data-collection-id="all">
                <div class="collection-header" onclick="toggleCollection(this)">
                    <div class="collection-title">
                        <span class="expand-icon">▶</span>
                        <h3>All Papers</h3>
                    </div>
                    <span class="paper-count">{{ papers|length }}</span>
                </div>
                <div id="allPapers" class="collection-papers" ondrop="drop(event)" ondragover="allowDrop(event)">
                    {% for paper in papers %}
                    <div class="paper-item" 
                         data-paper-id="{{ paper.id|string }}"
                         data-title="{{ paper.title }}"
                         draggable="true"
                         ondragstart="drag(event)">
                        <div class="paper-title">{{ paper.title }}</div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <!-- User collections -->
            <div id="userCollections"></div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Mode Selector -->
            <div class="mode-selector">
                <button class="mode-button active" onclick="switchMode('search')" data-mode="search">
                    <i class="fas fa-search"></i>
                    Search Mode
                </button>
                <button class="mode-button" onclick="switchMode('chat')" data-mode="chat">
                    <i class="fas fa-comments"></i>
                    Chat Mode
                </button>
            </div>

            <!-- Search Mode -->
            <div id="searchMode" class="active">
                <div class="search-section">
                    <div class="search-options">
                        <div class="search-toggle">
                            <input type="radio" id="searchArxiv" name="searchSource" value="arxiv" checked>
                            <label for="searchArxiv">Search arXiv</label>
                            
                            <input type="radio" id="searchLocal" name="searchSource" value="local">
                            <label for="searchLocal">Search My Papers</label>
                            
                            <input type="radio" id="searchBoth" name="searchSource" value="both">
                            <label for="searchBoth">Search Both</label>
                        </div>
                    </div>
                    <div class="search-input-group">
                        <input type="text" id="searchInput" class="search-input" placeholder="Enter a topic to search...">
                        <button onclick="searchPapers()" class="search-button">Search</button>
                    </div>
                </div>
                <div id="selectedPaperSummary"></div>
                <div class="results-section" id="results"></div>
            </div>

            <!-- Chat Mode -->
            <div id="chatMode">
                <div class="chat-container">
                    <div class="chat-papers-selection">
                        <h3>Selected Papers for Chat</h3>
                        <div id="selectedPapersForChat"></div>
                    </div>
                    <div class="chat-messages" id="chatMessages"></div>
                </div>
                <div class="chat-input-container">
                    <textarea 
                        class="chat-input" 
                        placeholder="Ask a question about the selected papers..."
                        onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }">
                    </textarea>
                    <button class="search-button" onclick="sendMessage()">
                        <i class="fas fa-paper-plane"></i>
                        Send
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
